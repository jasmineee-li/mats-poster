<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Column Measurement</title>
<style>
  body { font-family: system-ui, sans-serif; padding: 20px; background: #f5f5f5; }
  h1 { font-size: 24px; margin-bottom: 16px; }
  .results { font-size: 16px; line-height: 1.8; }
  .results span { font-weight: 600; }
  iframe { display: none; }
</style>
</head>
<body>
<h1>Column Height Measurement</h1>
<div class="results" id="results">Measuring...</div>
<iframe id="frame" src="/poster.html" width="3456" height="2304"></iframe>
<script>
const frame = document.getElementById('frame');
frame.addEventListener('load', () => {
  const doc = frame.contentDocument;
  const poster = doc.querySelector('.poster');
  if (!poster) { document.getElementById('results').textContent = 'Error: poster not found'; return; }

  const cols = poster.querySelectorAll('.col');
  const header = poster.querySelector('.header');
  const headerH = header ? header.offsetHeight : 0;
  const availableH = 2304 - headerH;

  const measurements = {};
  const lines = [];
  cols.forEach((col, i) => {
    const name = ['left', 'middle', 'right'][i];
    const contentH = col.scrollHeight;
    const remaining = availableH - contentH;
    measurements[name] = { content: contentH, available: availableH, remaining };
    lines.push(`<span>${name}:</span> ${contentH}px content / ${availableH}px available / <strong>${remaining}px remaining</strong>`);
  });

  document.getElementById('results').innerHTML = lines.join('<br>');

  // Post to edits.json
  fetch('/edits', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key: '_measurements', value: JSON.stringify(measurements) }),
  });
});
</script>
</body>
</html>
